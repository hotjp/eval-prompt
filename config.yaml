# eval-prompt Configuration
# All settings can be overridden via environment variables with APP_ prefix.
# Example: APP_SERVER_PORT=9090 overrides the server.port value.

# HTTP Server settings
server:
  port: 8080
  host: 127.0.0.1
  metrics_port: 9090
  pprof_port: 6060
  read_timeout: 30s
  write_timeout: 30s

# Database settings (SQLite)
database:
  dsn: ""
  max_open: 25
  max_idle: 5
  max_lifetime: 5m

# Observability / Telemetry
telemetry:
  enabled: false
  endpoint: localhost:4317

# Sandbox execution limits
sandbox:
  allowed_commands:
    - npm
    - go
    - python
    - python3
    - node
    - git
    - curl
    - mkdir
    - cp
    - mv
  forbidden_patterns:
    - rm -rf /
    - rm -rf /*
    - "> /etc/"
    - "| sh"
    - "| bash"
    - curl .* | sh
  max_execution_time: 60s
  max_file_size: 10485760   # 10MB in bytes
  max_file_count: 1000

# Prompt asset repository
prompt_assets:
  repo_path: ""
  assets_dir: prompts
  evals_dir: .evals
  traces_dir: .traces
  eval_threshold: 80

# Plugin configurations
plugins:
  llm:
    enabled: false
    provider: openai
    api_key: ""
    endpoint: ""
    default_model: gpt-4o

  search:
    enabled: false
    type: basic
    url: ""
    api_key: ""
