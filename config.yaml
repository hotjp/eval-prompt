path: config.yaml
lang: en-US
server:
    port: 8080
    host: 127.0.0.1
    metricsport: 9090
    pprofport: 6060
    readtimeout: 30s
    writetimeout: 30s
database:
    dsn: ""
    maxopen: 25
    maxidle: 5
    maxlifetime: 5m0s
telemetry:
    enabled: false
    endpoint: localhost:4317
sandbox:
    allowedcommands:
        - npm
        - go
        - python
        - python3
        - node
        - git
        - curl
        - mkdir
        - cp
        - mv
    forbiddenpatterns:
        - rm -rf /
        - rm -rf /*
        - '> /etc/'
        - '| sh'
        - '| bash'
        - curl .* | sh
    maxexecutiontime: 1m0s
    maxfilesize: 10485760
    maxfilecount: 1000
plugins:
    llm:
        - name: minimax
          provider: openai-compatible
          api_key: sk-cp-RoPFThCxbKCkoA-O6V8SmL8xLD8dqC1mwL11sAutso2F-MpsPSfOuCaKCoiozms4GnyJSwApuH4SLEFSrTtPoddwIoJN7JrsBGQ7MjWoQrOfX22ewTPf-AI
          endpoint: https://api.minimaxi.com/v1
          default_model: MiniMax-M2.7-highspeed
          default: false
          ping_path: ""
    search:
        enabled: false
        type: basic
        url: ""
        apikey: ""
prompt_assets:
    repo_path: /Users/kingj/repo
    assets_dir: prompts
    evals_dir: .evals
    traces_dir: .traces
    eval_threshold: 80
    concurrency: 4
taxonomy:
    assettypes:
